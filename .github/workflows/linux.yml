name: linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Get git tags
        shell: bash
        run:  git fetch --tags

      - name: Setup prerequisites (linux)
        shell: bash
        run: |
          sudo apt update
          sudo apt install build-essential pkg-config libudev-dev libusb-1.0-0-dev

      - name: Compile blink1-tool
        shell: bash
        run: make

      - name: Compile blink1-tiny-server
        shell: bash
        run: make blink1-tiny-server

      - name: Cache curl build (linux)
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: blink1control-tool/curl-linux
          key: curl-7.78.0-linux-${{ hashFiles('blink1control-tool/Makefile') }}

      - name: Stub curl source dir on cache hit
        if: steps.cache-curl.outputs.cache-hit == 'true'
        shell: bash
        run: mkdir -p blink1control-tool/curl-7.78.0

      - name: Compile blink1control-tool
        shell: bash
        run: make blink1control-tool

      - name: Package blink1-tool
        shell: bash
        run: make package

      - name: Package blink1-tiny-server
        shell: bash
        run: make package-tiny-server

      - name: Package blink1control-tool
        shell: bash
        run: make package-blink1control-tool

      - name: Upload blink1 all artifacts
        uses: actions/upload-artifact@v7
        with:
          name: blink1-tool-all-artifacts-linux
          path: blink1*.zip
