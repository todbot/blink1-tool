name: macos

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      notarize:
        description: 'Sign and notarize binaries'
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Get git tags
        shell: bash
        run:  git fetch --tags

      - name: Check xcode version
        shell: bash
        run: xcodebuild -version

      - name: Compile blink1-tool
        shell: bash
        run: make

      - name: Compile blink1-tiny-server
        shell: bash
        run: make blink1-tiny-server

      - name: Cache curl build (macos)
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: blink1control-tool/curl-macosx
          key: curl-7.78.0-macosx-${{ hashFiles('blink1control-tool/Makefile') }}

      - name: Stub curl source dir on cache hit
        if: steps.cache-curl.outputs.cache-hit == 'true'
        shell: bash
        run: mkdir -p blink1control-tool/curl-7.78.0

      - name: Compile blink1control-tool
        shell: bash
        run: make blink1control-tool

      - name: Import signing certificate
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.notarize)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Sign binaries
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.notarize)
        run: |
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with identity: $SIGNING_IDENTITY"
          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --entitlements entitlements.mac.plist \
            blink1-tool blink1-tiny-server blink1control-tool/blink1control-tool
          codesign --verify --verbose \
            blink1-tool blink1-tiny-server blink1control-tool/blink1control-tool

      - name: Notarize binaries
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.notarize)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip blink1-tools-notarize.zip \
            blink1-tool blink1-tiny-server blink1control-tool/blink1control-tool
          xcrun notarytool submit blink1-tools-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm blink1-tools-notarize.zip

      - name: Package blink1-tool
        shell: bash
        run: make package

      - name: Package blink1-tiny-server
        shell: bash
        run: make package-tiny-server

      - name: Package blink1control-tool
        shell: bash
        run: make package-blink1control-tool

      - name: Upload blink1 all artifacts
        uses: actions/upload-artifact@v7
        with:
          name: blink1-tool-all-artifacts-macos
          path: blink1*.zip
