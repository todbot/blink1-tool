name: raspberrypi

on: [push, pull_request, workflow_dispatch]

env:
  HIDAPI_VERSION: "0.15.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: blink1-tool
      - uses: pguyot/arm-runner-action@v2
        with:
          base_image: raspios_lite_arm64:latest
          cpu: cortex-a53
          #base_image: raspios_lite:latest
          #cpu: cortex-a7
          copy_artifact_path: artifacts
          commands: |
            apt-get update
            apt-get install -y build-essential pkg-config libudev-dev libusb-1.0-0-dev
            cd blink1-tool
            make
            make blink1-tiny-server
            make package
            make package-tiny-server
            mkdir -p ../artifacts
            cp *.zip ../artifacts/
            ls -la ../artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: blink1-tool-raspberrypi
          path: artifacts/*.zip

