name: windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      notarize:
        description: 'Sign binaries (Azure Trusted Signing)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Get git tags
        shell: bash
        run:  git fetch --tags

      - name: Set up Visual Studio shell (path to lib.exe)
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Setup prerequisites (windows)
        run: |
          echo 'C:\msys64\usr\bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          C:\msys64\usr\bin\pacman -S --noconfirm zip unzip

      - name: Compile blink1-tool
        shell: bash
        run: make

      - name: Compile blink1-tiny-server
        shell: bash
        run: make blink1-tiny-server

      - name: Compile blink1control-tool
        shell: bash
        run: make blink1control-tool

      - name: Sign binaries (Azure Trusted Signing)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.notarize)
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: YOUR_ACCOUNT_NAME
          certificate-profile-name: YOUR_PROFILE_NAME
          files-folder: .
          files-folder-filter: exe
          files-folder-recurse: false

      - name: Package blink1-tool
        shell: bash
        run: make package

      - name: Package blink1-tiny-server
        shell: bash
        run: make package-tiny-server

      - name: Package blink1control-tool
        shell: bash
        run: make package-blink1control-tool

      - name: Upload blink1 all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blink1-tool-all-artifacts-windows
          path: blink1*.zip
